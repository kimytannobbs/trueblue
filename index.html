<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="True Blue"/>
<title>True Blue Aircon Cleaning — Client Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-400:#1D9E75;--teal-600:#0F6E56;--teal-800:#085041;
  --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-400:#EF9F27;--amber-600:#854F0B;--amber-800:#633806;
  --coral-50:#FAECE7;--coral-400:#D85A30;--coral-600:#993C1D;
  --blue-50:#E6F1FB;--blue-400:#378ADD;--blue-600:#185FA5;--blue-800:#0C447C;
  --red-50:#FCEBEB;--red-400:#E24B4A;--red-600:#A32D2D;
  --green-50:#EAF3DE;--green-600:#3B6D11;--green-800:#27500A;
  --gray-50:#F1EFE8;--gray-100:#D3D1C7;--gray-400:#888780;--gray-600:#5F5E5A;
  --bg:#F7F8F6;--surface:#FFFFFF;--border:#E2E4DF;
  --text:#1A1F1C;--text-2:#4A5250;--text-3:#7A8580;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0F1410;--surface:#1C221E;--border:#2C3530;--text:#E8EDE8;--text-2:#9AADA5;--text-3:#5A7068;}
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
.app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto;background:var(--bg);}
.header{background:var(--teal-600);padding:calc(var(--safe-top) + 14px) 18px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-title{color:white;font-size:19px;font-weight:600;letter-spacing:-0.3px;}
.header-sub{color:rgba(255,255,255,0.7);font-size:11px;margin-top:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.header-add{background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;}
.header-add:active{background:rgba(255,255,255,0.3);}
.sync-btn{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:7px 10px;font-size:12px;cursor:pointer;}
.sync-btn:active{background:rgba(255,255,255,0.3);}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-btn{flex:1;padding:11px 6px 10px;font-size:12px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--text-3);border-bottom:2.5px solid transparent;}
.nav-btn.active{color:var(--teal-600);border-bottom-color:var(--teal-600);}
.content{flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bottom) + 14px);-webkit-overflow-scrolling:touch;}
.search-wrap{display:flex;gap:8px;margin-bottom:12px;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;color:var(--text);outline:none;}
.search-input:focus{border-color:var(--teal-400);}
.filter-sel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 8px;font-size:12px;color:var(--text-2);outline:none;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.stat-num{font-size:22px;font-weight:600;color:var(--teal-600);}
.stat-lbl{font-size:10px;color:var(--text-3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:9px;cursor:pointer;}
.client-card.selected{border-color:var(--teal-400);border-width:1.5px;}
.client-card.overdue-card{border-left:4px solid var(--coral-400);}
.client-card.due-today-card{border-left:4px solid var(--amber-400);}
.card-top{display:flex;align-items:center;gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.av-teal{background:var(--teal-50);color:var(--teal-800);}
.av-blue{background:var(--blue-50);color:var(--blue-800);}
.av-amber{background:var(--amber-50);color:var(--amber-800);}
.av-coral{background:var(--coral-50);color:var(--coral-600);}
.av-green{background:var(--green-50);color:var(--green-800);}
.card-name{font-size:15px;font-weight:600;}
.card-addr{font-size:12px;color:var(--text-3);margin-top:1px;}
.card-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500;}
.b-green{background:var(--teal-50);color:var(--teal-800);}
.b-amber{background:var(--amber-50);color:var(--amber-800);}
.b-red{background:var(--red-50);color:var(--red-600);}
.b-blue{background:var(--blue-50);color:var(--blue-800);}
.b-gray{background:var(--gray-50);color:var(--gray-600);}
.b-fu{background:var(--amber-50);color:var(--amber-800);font-size:10px;padding:2px 7px;}
.b-cash{background:#EAF3DE;color:#27500A;}
.b-card{background:var(--blue-50);color:var(--blue-800);}
.b-bank{background:#EEEDFE;color:#3C3489;}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:4px;margin-bottom:14px;}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.detail-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;}
.detail-name{font-size:17px;font-weight:600;}
.detail-addr{font-size:12px;color:var(--text-3);margin-top:2px;}
.section-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px;}
.detail-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row:last-of-type{border-bottom:none;}
.dk{color:var(--text-2);}
.dv{color:var(--text);text-align:right;max-width:60%;}
.notes-box{font-size:13px;color:var(--text-2);line-height:1.55;padding:8px;background:var(--bg);border-radius:var(--radius-xs);margin-top:4px;}
.action-row{display:flex;gap:8px;margin-top:14px;}
.act-btn{flex:1;padding:10px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text);text-align:center;}
.act-btn:active{opacity:.8;}
.act-btn.primary{background:var(--teal-600);color:white;border-color:var(--teal-600);}
.act-btn.danger{background:var(--red-50);color:var(--red-600);border-color:var(--red-600);}
.fu-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.fu-item:last-child{border-bottom:none;}
.fu-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px;}
.fi-done{background:var(--teal-50);color:var(--teal-800);}
.fi-pending{background:var(--amber-50);color:var(--amber-800);}
.fi-overdue{background:var(--red-50);color:var(--red-600);}
.fu-title{font-size:13px;font-weight:500;}
.fu-meta{font-size:11px;color:var(--text-3);margin-top:2px;}
.fu-note{font-size:12px;color:var(--text-2);margin-top:3px;font-style:italic;}
.up-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.up-item:last-child{border-bottom:none;}
.up-date-box{background:var(--teal-50);border-radius:var(--radius-xs);padding:7px 10px;text-align:center;min-width:46px;flex-shrink:0;}
.up-day{font-size:20px;font-weight:700;color:var(--teal-600);line-height:1;}
.up-mon{font-size:9px;color:var(--teal-800);text-transform:uppercase;letter-spacing:.05em;}
.up-client{font-size:14px;font-weight:600;}
.up-type{font-size:12px;color:var(--text-3);margin-top:2px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 18px calc(var(--safe-bottom) + 20px);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;}
.form-group{margin-bottom:11px;}
.form-group label{font-size:11px;color:var(--text-3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);padding:9px 11px;font-size:14px;color:var(--text);font-family:inherit;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal-400);}
.form-group textarea{height:72px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.pay-options{display:flex;gap:7px;}
.pay-opt{flex:1;padding:9px 6px;border:1.5px solid var(--border);border-radius:var(--radius-xs);text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-2);background:var(--bg);}
.pay-opt.selected-cash{border-color:var(--green-600);background:var(--green-50);color:var(--green-600);}
.pay-opt.selected-card{border-color:var(--blue-600);background:var(--blue-50);color:var(--blue-800);}
.pay-opt.selected-bank{border-color:#534AB7;background:#EEEDFE;color:#3C3489;}
.del-confirm{background:var(--red-50);border:1px solid var(--red-600);border-radius:var(--radius-sm);padding:12px 14px;margin-top:12px;text-align:center;font-size:13px;color:var(--red-600);}
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;transform:translateX(-50%);background:#1A1F1C;color:white;font-size:13px;padding:10px 18px;border-radius:20px;z-index:200;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:40px 16px;color:var(--text-3);font-size:14px;}
.sync-status{font-size:11px;padding:6px 12px;border-radius:20px;text-align:center;margin-bottom:12px;font-weight:500;}
.sync-ok{background:var(--teal-50);color:var(--teal-800);}
.sync-err{background:var(--red-50);color:var(--red-600);}
.sync-ing{background:var(--amber-50);color:var(--amber-800);}
.sync-none{background:var(--gray-50);color:var(--gray-600);}

/* SETUP SCREEN */
.setup-screen{padding:20px 16px;max-width:520px;margin:0 auto;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.setup-title{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--teal-600);}
.setup-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.55;color:var(--text-2);}
.setup-step:last-child{border-bottom:none;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--teal-600);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.setup-step a{color:var(--teal-600);text-decoration:none;}
.setup-step code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:12px;font-family:monospace;color:var(--text);}
.url-input{width:100%;background:var(--bg);border:1.5px solid var(--teal-400);border-radius:var(--radius-xs);padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none;margin-top:8px;}
.big-btn{display:block;width:100%;padding:13px;background:var(--teal-600);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;text-align:center;margin-top:10px;}
.big-btn:active{background:var(--teal-800);}
.skip-btn{display:block;width:100%;padding:11px;background:var(--bg);color:var(--text-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div>
      <div class="header-sub">True Blue Aircon Cleaning</div>
      <div class="header-title">Client Manager</div>
    </div>
    <div class="header-right">
      <button class="sync-btn" onclick="syncNow()" title="Sync now">⟳ Sync</button>
      <button class="header-add" onclick="openAddModal()">+ Add client</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" id="tab-clients" onclick="switchTab('clients')">Clients</button>
    <button class="nav-btn" id="tab-upcoming" onclick="switchTab('upcoming')">Upcoming</button>
    <button class="nav-btn" id="tab-followups" onclick="switchTab('followups')">Follow-ups</button>
    <button class="nav-btn" id="tab-settings" onclick="switchTab('settings')">Settings</button>
  </div>
  <div class="content" id="main-content"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="modal" style="display:none;" onclick="overlayClick(event,'modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">Add new client</div>
    <div class="form-row">
      <div class="form-group"><label>First name</label><input id="f-first" placeholder="Sarah"/></div>
      <div class="form-group"><label>Last name</label><input id="f-last" placeholder="Johnson"/></div>
    </div>
    <div class="form-group"><label>Address</label><input id="f-addr" placeholder="12 Rose St, Hawthorn QLD"/></div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input id="f-phone" type="tel" placeholder="0412 345 678"/></div>
      <div class="form-group"><label>Email</label><input id="f-email" type="email" placeholder="sarah@email.com"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Service type</label>
        <select id="f-service">
          <option>Regular clean</option><option>End of lease</option><option>Spring clean</option>
          <option>Office clean</option><option>Deep clean</option><option>Bond clean</option>
        </select>
      </div>
      <div class="form-group"><label>Frequency</label>
        <select id="f-freq">
          <option>Weekly</option><option>Fortnightly</option><option>Monthly</option>
          <option>6-monthly</option><option>One-off</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Last clean date</label><input type="date" id="f-lastclean"/></div>
      <div class="form-group"><label>Rate ($ per visit)</label><input id="f-rate" type="number" placeholder="180"/></div>
    </div>
    <div class="form-group">
      <label>Payment method</label>
      <div class="pay-options" id="pay-selector">
        <div class="pay-opt" onclick="selectPay('Cash')">💵 Cash</div>
        <div class="pay-opt" onclick="selectPay('Card')">💳 Card</div>
        <div class="pay-opt" onclick="selectPay('Bank transfer')">🏦 Bank transfer</div>
      </div>
    </div>
    <div class="form-group"><label>Notes (access, pets, preferences...)</label><textarea id="f-notes" placeholder="Key under mat, 2 dogs, no bleach..."></textarea></div>
    <div class="modal-actions">
      <button class="act-btn" onclick="closeModal('modal')">Cancel</button>
      <button class="act-btn primary" id="save-btn" onclick="saveClient()">Save client</button>
    </div>
    <div id="del-section" style="display:none;">
      <div class="del-confirm">
        <div style="margin-bottom:8px;font-weight:600;">Delete this client?</div>
        <div style="margin-bottom:10px;font-size:12px;">This cannot be undone.</div>
        <button class="act-btn danger" onclick="deleteClient()" style="width:100%;">Yes, delete client</button>
      </div>
    </div>
    <div id="edit-del-btn" style="display:none;margin-top:10px;">
      <button class="act-btn" style="width:100%;color:var(--red-600);" onclick="showDelConfirm()">Delete client</button>
    </div>
  </div>
</div>

<!-- FOLLOW-UP MODAL -->
<div class="overlay" id="fu-modal" style="display:none;" onclick="overlayClick(event,'fu-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Log follow-up</div>
    <div class="form-group"><label>Follow-up type</label>
      <select id="fu-type">
        <option>Post-clean check-in call</option><option>Satisfaction feedback</option>
        <option>6-month reminder sent</option><option>Quote provided</option>
        <option>Rebook confirmed</option><option>Issue raised</option>
        <option>Issue resolved</option><option>Payment received</option><option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="fu-date"/></div>
      <div class="form-group"><label>Status</label>
        <select id="fu-status">
          <option value="done">Done</option>
          <option value="pending">Pending</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="fu-note" placeholder="Client happy, rebook next month..."></textarea></div>
    <div class="modal-actions">
      <button class="act-btn" onclick="closeModal('fu-modal')">Cancel</button>
      <button class="act-btn primary" onclick="saveFu()">Save follow-up</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AV_COLORS = ['av-teal','av-blue','av-amber','av-coral','av-green'];
const STORAGE_KEY = 'trueblue_v2_clients';
const SHEET_URL_KEY = 'trueblue_sheet_url';

let clients = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let sheetUrl = localStorage.getItem(SHEET_URL_KEY) || 'https://script.google.com/macros/s/AKfycbyPq4y0n_IfLLw_emvP-uqiHNenl8NGKlOmOO7LrhSXxQu8D5RurthFN69WAL70VFTo/exec';
let selectedId = null;
let currentTab = 'clients';
let searchTerm = '';
let filterStatus = 'all';
let fuClientId = null;
let editingId = null;
let selectedPay = '';
let syncState = 'none'; // none | syncing | ok | error
let lastSync = null;

function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(clients)); }
function saveSheetUrl(url) { sheetUrl = url; localStorage.setItem(SHEET_URL_KEY, url); }

// ---- GOOGLE SHEETS SYNC ----
// Uses a Google Apps Script Web App as middleware
// The script URL is stored by the user in Settings

async function syncNow() {
  if (!sheetUrl) { toast('Set up Google Sheets in Settings tab first'); switchTab('settings'); return; }
  syncState = 'syncing';
  renderSyncStatus();
  try {
    // PULL FIRST - get latest from sheet
    const getRes = await fetch(sheetUrl + '?action=read&t=' + Date.now());
    if (getRes.ok) {
      const text = await getRes.text();
      try {
        const data = JSON.parse(text);
        if (data && Array.isArray(data.clients) && data.clients.length > 0) {
          // Sheet has more clients than local - use sheet data
          if (data.clients.length >= clients.length) {
            clients = data.clients;
            saveLocal();
          }
        }
      } catch(pe) {}
    }
    // THEN PUSH local data to sheet
    const form = new FormData();
    form.append('action', 'write');
    form.append('data', JSON.stringify(clients));
    await fetch(sheetUrl, {method:'POST', mode:'no-cors', body: form});
    syncState = 'ok';
    lastSync = new Date();
    toast('Synced with Google Sheets ✓');
  } catch(e) {
    syncState = 'error';
    toast('Sync failed — check your Sheet URL in Settings');
  }
  renderAll();
}

async function pushToSheet() {
  if (!sheetUrl) return;
  try {
    const form = new FormData();
    form.append('action', 'write');
    form.append('data', JSON.stringify(clients));
    fetch(sheetUrl, {method:'POST', mode:'no-cors', body: form});
  } catch(e) {}
}

function renderSyncStatus() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (!sheetUrl) { el.className='sync-status sync-none'; el.textContent='Not connected to Google Sheets'; return; }
  if (syncState==='syncing') { el.className='sync-status sync-ing'; el.textContent='Syncing...'; return; }
  if (syncState==='ok') { el.className='sync-status sync-ok'; el.textContent='Synced ' + (lastSync?lastSync.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}):''); return; }
  if (syncState==='error') { el.className='sync-status sync-err'; el.textContent='Sync error — tap ⟳ Sync to retry'; return; }
  el.className='sync-status sync-none'; el.textContent='Tap ⟳ Sync to load latest data';
}

// ---- HELPERS ----
function initials(c) { return ((c.first||'?')[0]+(c.last||'?')[0]).toUpperCase(); }
function avColor(c) { return AV_COLORS[(c.id||0) % AV_COLORS.length]; }
function avBg(col){ return col==='av-teal'?'var(--teal-50)':col==='av-blue'?'var(--blue-50)':col==='av-amber'?'var(--amber-50)':col==='av-coral'?'var(--coral-50)':'var(--green-50)'; }
function avFg(col){ return col==='av-teal'?'var(--teal-800)':col==='av-blue'?'var(--blue-800)':col==='av-amber'?'var(--amber-800)':col==='av-coral'?'var(--coral-600)':'var(--green-800)'; }

function nextCleanDate(c) {
  if (!c.lastclean) return null;
  const d = new Date(c.lastclean);
  if (c.freq==='Weekly') d.setDate(d.getDate()+7);
  else if (c.freq==='Fortnightly') d.setDate(d.getDate()+14);
  else if (c.freq==='Monthly') d.setMonth(d.getMonth()+1);
  else if (c.freq==='6-monthly') d.setMonth(d.getMonth()+6);
  else return null;
  return d;
}
function daysUntil(d) { const n=new Date(); n.setHours(0,0,0,0); return Math.round((d-n)/86400000); }
function fmtDate(s) { if(!s) return '—'; return new Date(s).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); }
function fmtShort(d) { if(!d) return '—'; return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function payClass(p) { if(p==='Cash') return 'b-cash'; if(p==='Card') return 'b-card'; if(p==='Bank transfer') return 'b-bank'; return 'b-gray'; }
function hasPending(c) { return c.followups && c.followups.some(f=>f.status!=='done'); }

function statusBadge(c) {
  const next=nextCleanDate(c);
  if (!next) return '<span class="badge b-gray">One-off</span>';
  const days=daysUntil(next);
  if (days<0) return '<span class="badge b-red">Overdue '+Math.abs(days)+'d</span>';
  if (days===0) return '<span class="badge b-amber">Due today</span>';
  if (days<=3) return '<span class="badge b-amber">Due in '+days+'d</span>';
  return '<span class="badge b-green">Next: '+fmtShort(next)+'</span>';
}

function filteredClients() {
  return clients.filter(c => {
    const q=(c.first+' '+c.last+' '+(c.addr||'')).toLowerCase();
    if (searchTerm && !q.includes(searchTerm.toLowerCase())) return false;
    if (filterStatus==='overdue') { const n=nextCleanDate(c); return n&&daysUntil(n)<0; }
    if (filterStatus==='followup') return hasPending(c);
    if (filterStatus==='6monthly') return c.freq==='6-monthly';
    return true;
  });
}

// ---- RENDER CLIENTS ----
function renderClients() {
  const list=filteredClients();
  const overdueCt=clients.filter(c=>{const n=nextCleanDate(c);return n&&daysUntil(n)<0;}).length;
  const fuCt=clients.filter(c=>hasPending(c)).length;
  let h=`<div id="sync-status" class="sync-status sync-none"></div>
  <div class="search-wrap">
    <input class="search-input" placeholder="Search name or address..." value="${searchTerm}" oninput="searchTerm=this.value;renderAll()"/>
    <select class="filter-sel" onchange="filterStatus=this.value;renderAll()">
      <option value="all" ${filterStatus==='all'?'selected':''}>All</option>
      <option value="overdue" ${filterStatus==='overdue'?'selected':''}>Overdue</option>
      <option value="followup" ${filterStatus==='followup'?'selected':''}>Follow-ups</option>
      <option value="6monthly" ${filterStatus==='6monthly'?'selected':''}>6-monthly</option>
    </select>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">${clients.length}</div><div class="stat-lbl">Clients</div></div>
    <div class="stat-card"><div class="stat-num">${overdueCt}</div><div class="stat-lbl">Overdue</div></div>
    <div class="stat-card"><div class="stat-num">${fuCt}</div><div class="stat-lbl">Follow-ups</div></div>
  </div>`;
  if (!list.length) h+='<div class="empty">No clients yet — tap + Add client</div>';
  list.forEach(c=>{
    const next=nextCleanDate(c); const days=next?daysUntil(next):null;
    const cc=(days!==null&&days<0)?'overdue-card':days===0?'due-today-card':'';
    const sel=selectedId===c.id?'selected':'';
    const col=avColor(c);
    h+=`<div class="client-card ${cc} ${sel}" onclick="selectClient(${c.id})">
      <div class="card-top">
        <div class="avatar ${col}">${initials(c)}</div>
        <div style="flex:1"><div class="card-name">${c.first} ${c.last}</div><div class="card-addr">${c.addr||''}</div></div>
        ${hasPending(c)?'<span class="badge b-fu">Follow-up</span>':''}
      </div>
      <div class="card-badges">
        <span class="badge b-blue">${c.service||''}</span>
        <span class="badge b-gray">${c.freq||''}</span>
        ${c.pay?`<span class="badge ${payClass(c.pay)}">${c.pay}</span>`:''}
        ${statusBadge(c)}
      </div>
    </div>`;
    if (selectedId===c.id) h+=renderDetail(c);
  });
  document.getElementById('main-content').innerHTML=h;
  renderSyncStatus();
}

function renderDetail(c) {
  const next=nextCleanDate(c); const col=avColor(c);
  let fuH='';
  if (c.followups&&c.followups.length) {
    c.followups.slice().reverse().forEach(f=>{
      const ic=f.status==='done'?'fi-done':f.status==='overdue'?'fi-overdue':'fi-pending';
      const sym=f.status==='done'?'✓':f.status==='overdue'?'!':'·';
      fuH+=`<div class="fu-item"><div class="fu-icon ${ic}">${sym}</div><div style="flex:1">
        <div class="fu-title">${f.type}</div>
        <div class="fu-meta">${fmtDate(f.date)} · <span style="text-transform:capitalize">${f.status}</span></div>
        ${f.note?`<div class="fu-note">"${f.note}"</div>`:''}
      </div></div>`;
    });
  } else fuH='<div style="font-size:13px;color:var(--text-3);padding:6px 0;">No follow-ups yet</div>';
  return `<div class="detail-panel">
    <div class="detail-header">
      <div class="detail-avatar" style="background:${avBg(col)};color:${avFg(col)}">${initials(c)}</div>
      <div style="flex:1"><div class="detail-name">${c.first} ${c.last}</div><div class="detail-addr">${c.addr||''}</div></div>
      <button class="act-btn" style="flex:none;padding:7px 14px;font-size:12px;" onclick="openEditModal(${c.id})">Edit</button>
    </div>
    <div class="section-lbl">Contact</div>
    <div class="detail-row"><span class="dk">Phone</span><span class="dv">${c.phone||'—'}</span></div>
    <div class="detail-row"><span class="dk">Email</span><span class="dv">${c.email||'—'}</span></div>
    <div class="section-lbl">Service</div>
    <div class="detail-row"><span class="dk">Type</span><span class="dv">${c.service||'—'}</span></div>
    <div class="detail-row"><span class="dk">Frequency</span><span class="dv">${c.freq||'—'}</span></div>
    <div class="detail-row"><span class="dk">Rate</span><span class="dv">${c.rate?'$'+c.rate+' per visit':'—'}</span></div>
    <div class="detail-row"><span class="dk">Payment</span><span class="dv"><span class="badge ${payClass(c.pay)}">${c.pay||'—'}</span></span></div>
    <div class="detail-row"><span class="dk">Last clean</span><span class="dv">${fmtDate(c.lastclean)}</span></div>
    <div class="detail-row"><span class="dk">Next due</span><span class="dv">${next?fmtShort(next):'—'}</span></div>
    ${c.notes?`<div class="section-lbl">Notes</div><div class="notes-box">${c.notes}</div>`:''}
    <div class="section-lbl">Follow-up history</div>
    ${fuH}
    <div class="action-row">
      <button class="act-btn" onclick="openFuModal(${c.id})">+ Log follow-up</button>
      <button class="act-btn primary" onclick="markCleaned(${c.id})">Mark cleaned today</button>
    </div>
  </div>`;
}

// ---- RENDER UPCOMING ----
function renderUpcoming() {
  const list=[];
  clients.forEach(c=>{const n=nextCleanDate(c);if(n)list.push({c,n,days:daysUntil(n)});});
  list.sort((a,b)=>a.days-b.days);
  let h='<div style="font-size:15px;font-weight:600;margin-bottom:12px;">Scheduled cleans</div>';
  if (!list.length) {h+='<div class="empty">No recurring cleans scheduled</div>';document.getElementById('main-content').innerHTML=h;return;}
  list.forEach(({c,n,days})=>{
    const day=n.toLocaleDateString('en-AU',{day:'numeric'});
    const mon=n.toLocaleDateString('en-AU',{month:'short'});
    const lbl=days<0?`<span class="badge b-red">Overdue</span>`:days===0?`<span class="badge b-amber">Today</span>`:`<span class="badge b-gray">In ${days}d</span>`;
    h+=`<div class="up-item" onclick="switchTab('clients');selectClient(${c.id})">
      <div class="up-date-box"><div class="up-day">${day}</div><div class="up-mon">${mon}</div></div>
      <div style="flex:1"><div class="up-client">${c.first} ${c.last}</div><div class="up-type">${c.service||''} · ${c.addr||''}</div></div>
      ${lbl}
    </div>`;
  });
  document.getElementById('main-content').innerHTML=h;
}

// ---- RENDER FOLLOWUPS ----
function renderFollowups() {
  const all=[];
  clients.forEach(c=>{if(c.followups)c.followups.forEach(f=>all.push({f,c}));});
  all.sort((a,b)=>new Date(b.f.date)-new Date(a.f.date));
  const pending=all.filter(x=>x.f.status!=='done');
  const done=all.filter(x=>x.f.status==='done');
  let h='<div style="font-size:15px;font-weight:600;margin-bottom:12px;">Pending follow-ups</div>';
  if (!pending.length) h+='<div class="empty" style="padding:20px 16px;">All follow-ups complete!</div>';
  pending.forEach(({f,c})=>{
    const ic=f.status==='overdue'?'fi-overdue':'fi-pending';
    const sym=f.status==='overdue'?'!':'·';
    h+=`<div class="fu-item" onclick="switchTab('clients');selectClient(${c.id})" style="cursor:pointer;">
      <div class="fu-icon ${ic}">${sym}</div>
      <div style="flex:1"><div class="fu-title">${f.type}</div><div class="fu-meta">${c.first} ${c.last} · ${fmtDate(f.date)}</div>${f.note?`<div class="fu-note">"${f.note}"</div>`:''}</div>
      <span class="badge ${f.status==='overdue'?'b-red':'b-amber'}" style="font-size:10px;flex-shrink:0;">${f.status}</span>
    </div>`;
  });
  if (done.length) {
    h+='<div style="font-size:13px;font-weight:600;color:var(--text-3);margin:16px 0 6px;">Recently completed</div>';
    done.slice(0,8).forEach(({f,c})=>{
      h+=`<div class="fu-item"><div class="fu-icon fi-done">✓</div><div style="flex:1"><div class="fu-title">${f.type}</div><div class="fu-meta">${c.first} ${c.last} · ${fmtDate(f.date)}</div></div></div>`;
    });
  }
  document.getElementById('main-content').innerHTML=h;
}

// ---- RENDER SETTINGS ----
function renderSettings() {
  const connected = !!sheetUrl;
  let h=`<div class="setup-card">
    <div class="setup-title">${connected ? '✅ Google Sheets Connected' : '🔗 Connect Google Sheets'}</div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:14px;line-height:1.5;">
      ${connected ? 'Your app is syncing with Google Sheets. Both you and John can tap ⟳ Sync to get the latest client data.' : 'Connect Google Sheets so you and John always see the same client list. Follow these steps once — takes about 10 minutes.'}
    </p>

    <div class="setup-step">
      <div class="step-num">1</div>
      <div>Go to <a href="https://sheets.new" target="_blank">sheets.new</a> to create a new Google Sheet. Name it <strong>True Blue Clients</strong>.</div>
    </div>
    <div class="setup-step">
      <div class="step-num">2</div>
      <div>In the sheet, click <strong>Extensions → Apps Script</strong>. Delete everything in the editor and paste in the script from the instructions file that came with this app.</div>
    </div>
    <div class="setup-step">
      <div class="step-num">3</div>
      <div>Click <strong>Deploy → New deployment</strong>. Set type to <strong>Web app</strong>. Set "Who has access" to <strong>Anyone</strong>. Click Deploy and copy the URL.</div>
    </div>
    <div class="setup-step">
      <div class="step-num">4</div>
      <div>Paste the Web App URL below and tap Save. Do the same on John's phone.</div>
    </div>

    <input class="url-input" id="sheet-url-input" type="url" placeholder="https://script.google.com/macros/s/..." value="${sheetUrl}"/>
    <button class="big-btn" onclick="saveSheetConnection()">💾 Save & Connect</button>
    ${connected?`<button class="skip-btn" onclick="testSync()">Test connection now</button>`:''}
    ${connected?`<button class="skip-btn" style="color:var(--red-600);" onclick="disconnectSheet()">Disconnect Google Sheets</button>`:''}
  </div>

  <div class="setup-card">
    <div class="setup-title">📋 Export to CSV</div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:12px;">Copy all client data to paste into Google Sheets for printing.</p>
    <button class="big-btn" onclick="copyCSV()" style="background:var(--gray-600);">Copy CSV data (${clients.length} clients)</button>
    <button class="skip-btn" onclick="window.open('https://sheets.new','_blank')">Open new Google Sheet</button>
  </div>

  <div class="setup-card">
    <div class="setup-title">📱 Add to iPhone Home Screen</div>
    <div class="setup-step"><div class="step-num">1</div><div>Open this app in <strong>Safari</strong></div></div>
    <div class="setup-step"><div class="step-num">2</div><div>Tap the <strong>Share button</strong> (box with arrow at bottom)</div></div>
    <div class="setup-step"><div class="step-num">3</div><div>Tap <strong>"Add to Home Screen"</strong> → Add</div></div>
    <div class="setup-step"><div class="step-num">4</div><div>It appears as <strong>"True Blue"</strong> — full screen, no browser bar</div></div>
  </div>

  <div class="setup-card">
    <div class="setup-title">🖥️ Share with John</div>
    <div class="setup-step"><div class="step-num">1</div><div>Host this file on <strong>GitHub Pages</strong> (free forever) so John can open the same link</div></div>
    <div class="setup-step"><div class="step-num">2</div><div>Go to <a href="https://github.com/kimytannobbs" target="_blank">github.com/kimytannobbs</a> and create a new repository called <code>trueblue</code></div></div>
    <div class="setup-step"><div class="step-num">3</div><div>Upload this <code>index.html</code> file to the repository</div></div>
    <div class="setup-step"><div class="step-num">4</div><div>Go to Settings → Pages → set Source to <strong>main branch</strong> → Save</div></div>
    <div class="setup-step"><div class="step-num">5</div><div>Your app will be live at: <strong>kimytannobbs.github.io/trueblue</strong> — send that link to John!</div></div>
  </div>`;
  document.getElementById('main-content').innerHTML=h;
}

function saveSheetConnection() {
  const url = document.getElementById('sheet-url-input').value.trim();
  if (!url || !url.startsWith('https://script.google.com')) { toast('Please paste a valid Google Apps Script URL'); return; }
  saveSheetUrl(url);
  toast('Connected! Tap ⟳ Sync to test');
  renderAll();
}

function testSync() { syncNow(); }

function disconnectSheet() {
  saveSheetUrl('');
  syncState='none';
  toast('Disconnected from Google Sheets');
  renderAll();
}

function copyCSV() {
  const headers=['First name','Last name','Address','Phone','Email','Service','Frequency','Rate','Payment','Last clean','Next due','Notes'];
  const rows=clients.map(c=>{
    const next=nextCleanDate(c);
    return [c.first,c.last,c.addr||'',c.phone||'',c.email||'',c.service||'',c.freq||'',c.rate?'$'+c.rate:'',c.pay||'',fmtDate(c.lastclean),next?fmtShort(next):'',(c.notes||'').replace(/,/g,' ')].map(v=>`"${v}"`).join(',');
  });
  const csv=[headers.join(','),...rows].join('\n');
  navigator.clipboard.writeText(csv).then(()=>toast('Copied! Paste into Google Sheets')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=csv; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('Copied! Paste into Google Sheets');
  });
}

// ---- TOAST ----
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ---- MODALS ----
function overlayClick(e,id){if(e.target.classList.contains('overlay'))closeModal(id);}
function closeModal(id){document.getElementById(id).style.display='none';editingId=null;}

function selectPay(method) {
  selectedPay=method;
  document.querySelectorAll('.pay-opt').forEach(el=>{
    el.className='pay-opt';
    if(el.textContent.includes('Cash')&&method==='Cash')el.classList.add('selected-cash');
    if(el.textContent.includes('Card')&&method==='Card')el.classList.add('selected-card');
    if(el.textContent.includes('Bank')&&method==='Bank transfer')el.classList.add('selected-bank');
  });
}

function openAddModal() {
  editingId=null;
  document.getElementById('modal-title').textContent='Add new client';
  document.getElementById('save-btn').textContent='Save client';
  document.getElementById('del-section').style.display='none';
  document.getElementById('edit-del-btn').style.display='none';
  ['f-first','f-last','f-addr','f-phone','f-email','f-rate','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-service').value='Regular clean';
  document.getElementById('f-freq').value='Fortnightly';
  document.getElementById('f-lastclean').value=new Date().toISOString().split('T')[0];
  selectedPay='';
  document.querySelectorAll('.pay-opt').forEach(el=>el.className='pay-opt');
  document.getElementById('modal').style.display='flex';
}

function openEditModal(id) {
  const c=clients.find(x=>x.id===id); if(!c) return;
  editingId=id;
  document.getElementById('modal-title').textContent='Edit client';
  document.getElementById('save-btn').textContent='Save changes';
  document.getElementById('del-section').style.display='none';
  document.getElementById('edit-del-btn').style.display='block';
  document.getElementById('f-first').value=c.first||'';
  document.getElementById('f-last').value=c.last||'';
  document.getElementById('f-addr').value=c.addr||'';
  document.getElementById('f-phone').value=c.phone||'';
  document.getElementById('f-email').value=c.email||'';
  document.getElementById('f-rate').value=c.rate||'';
  document.getElementById('f-notes').value=c.notes||'';
  document.getElementById('f-service').value=c.service||'Regular clean';
  document.getElementById('f-freq').value=c.freq||'Fortnightly';
  document.getElementById('f-lastclean').value=c.lastclean||'';
  selectedPay=c.pay||'';
  document.querySelectorAll('.pay-opt').forEach(el=>el.className='pay-opt');
  if(c.pay)selectPay(c.pay);
  document.getElementById('modal').style.display='flex';
}

function showDelConfirm(){document.getElementById('del-section').style.display='block';}

function deleteClient() {
  clients=clients.filter(x=>x.id!==editingId);
  if(selectedId===editingId)selectedId=null;
  saveLocal(); pushToSheet(); closeModal('modal'); renderAll();
  toast('Client deleted');
}

function saveClient() {
  const first=document.getElementById('f-first').value.trim();
  const last=document.getElementById('f-last').value.trim();
  if(!first||!last){alert('Please enter client name');return;}
  const data={first,last,addr:document.getElementById('f-addr').value.trim(),phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),service:document.getElementById('f-service').value,freq:document.getElementById('f-freq').value,lastclean:document.getElementById('f-lastclean').value,rate:document.getElementById('f-rate').value.trim(),pay:selectedPay,notes:document.getElementById('f-notes').value.trim()};
  if(editingId){
    const idx=clients.findIndex(x=>x.id===editingId);
    if(idx!==-1)clients[idx]={...clients[idx],...data};
    toast('Client updated');
  } else {
    const maxId=clients.length?Math.max(...clients.map(c=>c.id)):0;
    clients.push({id:maxId+1,followups:[],...data});
    toast('Client added');
  }
  saveLocal(); pushToSheet(); closeModal('modal'); renderAll();
}

function openFuModal(id) {
  fuClientId=id;
  document.getElementById('fu-note').value='';
  document.getElementById('fu-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('fu-modal').style.display='flex';
}

function saveFu() {
  const c=clients.find(x=>x.id===fuClientId); if(!c)return;
  if(!c.followups)c.followups=[];
  c.followups.push({type:document.getElementById('fu-type').value,date:document.getElementById('fu-date').value,status:document.getElementById('fu-status').value,note:document.getElementById('fu-note').value.trim()});
  saveLocal(); pushToSheet(); closeModal('fu-modal'); renderAll();
  toast('Follow-up saved');
}

function markCleaned(id) {
  const c=clients.find(x=>x.id===id); if(!c)return;
  c.lastclean=new Date().toISOString().split('T')[0];
  if(!c.followups)c.followups=[];
  c.followups.push({type:'Post-clean check-in call',date:c.lastclean,status:'pending',note:"Follow up after today's clean"});
  saveLocal(); pushToSheet(); renderAll();
  toast('Marked cleaned — follow-up reminder added');
}

function selectClient(id){selectedId=selectedId===id?null:id;renderAll();}

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderAll();
}

function renderAll() {
  if(currentTab==='clients')renderClients();
  else if(currentTab==='upcoming')renderUpcoming();
  else if(currentTab==='followups')renderFollowups();
  else renderSettings();
}

// Auto-sync on load if connected
renderAll();
if(sheetUrl) setTimeout(syncNow, 800);
</script>
